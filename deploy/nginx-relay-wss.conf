# 消息中转 WSS — 被主配置 include 进 kuroneko.chat 的 server 块
# 最终地址: wss://kuroneko.chat/relay （已部署）
# 部署: 1) 将此文件复制为 /etc/nginx/conf.d/kuroneko-relay.conf
#       2) 在 nginx.conf 的 server { server_name kuroneko.chat; ... } 内加: include /etc/nginx/conf.d/kuroneko-relay.conf;
#       3) nginx -t && systemctl reload nginx
location /relay {
    proxy_pass http://127.0.0.1:9090;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400;
}
