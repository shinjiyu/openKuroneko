# openKuroneko relay — wss://kuroneko.chat
# 放置到 /etc/nginx/conf.d/kuroneko-relay.conf 后重载 nginx
# 证书由 certbot 申请后路径一般为 /etc/letsencrypt/live/kuroneko.chat/fullchain.pem 与 privkey.pem

upstream relay_backend {
    server 127.0.0.1:9090;
}

server {
    listen 80;
    server_name kuroneko.chat;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name kuroneko.chat;

    ssl_certificate     /etc/letsencrypt/live/kuroneko.chat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kuroneko.chat/privkey.pem;

    location / {
        proxy_pass http://relay_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
