<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>openKuroneko Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --bg2:       #161b22;
      --bg3:       #21262d;
      --border:    #30363d;
      --text:      #c9d1d9;
      --text-dim:  #8b949e;
      --blue:      #58a6ff;
      --green:     #3fb950;
      --yellow:    #d29922;
      --red:       #f85149;
      --purple:    #bc8cff;
      --user-bg:   #1f6feb;
      --agent-bg:  #21262d;
    }

    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-rows: 48px 1fr;
      grid-template-columns: 380px 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }
    header .logo { font-size: 16px; font-weight: 700; color: var(--blue); }
    header .agent-id { font-size: 11px; color: var(--text-dim); font-family: monospace; }
    header .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-dim); margin-left: auto; flex-shrink: 0;
      transition: background .3s;
    }
    header .dot.connected { background: var(--green); }
    header .status-text { font-size: 11px; color: var(--text-dim); }

    /* ── Chat panel ── */
    .chat-panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
      min-width: 0;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    /* Scrollbar */
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Message bubble ── */
    .msg { display: flex; gap: 10px; max-width: 100%; }
    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
      background: var(--bg3); border: 1px solid var(--border);
    }
    .msg.user .avatar { background: var(--user-bg); border-color: transparent; }

    .bubble {
      max-width: calc(100% - 80px);
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.6;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--user-bg);
      color: #fff;
      border-bottom-right-radius: 3px;
    }
    .msg.agent .bubble {
      background: var(--agent-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
    }

    /* Markdown in bubble */
    .bubble p { margin: 0 0 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble code {
      background: rgba(255,255,255,.06);
      padding: 1px 5px; border-radius: 3px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 12px;
    }
    .bubble pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .bubble pre code { background: none; padding: 0; }
    .bubble ul, .bubble ol { padding-left: 18px; margin: 6px 0; }
    .bubble li { margin: 3px 0; }
    .bubble h1,.bubble h2,.bubble h3 { margin: 10px 0 6px; font-size: 1em; color: var(--blue); }

    .meta { font-size: 11px; color: var(--text-dim); margin-top: 4px; padding: 0 4px; }
    .msg.user .meta { text-align: right; }

    /* Thinking indicator */
    .thinking { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
    .thinking span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-dim);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .thinking span:nth-child(2) { animation-delay: .2s; }
    .thinking span:nth-child(3) { animation-delay: .4s; }
    @keyframes pulse {
      0%, 100% { opacity: .3; transform: scale(.8); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    /* ── Input area ── */
    .input-area {
      padding: 12px 16px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 140px;
      line-height: 1.5;
      transition: border-color .2s;
    }
    textarea:focus { border-color: var(--blue); }
    textarea::placeholder { color: var(--text-dim); }

    button#send-btn {
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 18px;
      height: 40px;
      font-size: 14px;
      cursor: pointer;
      flex-shrink: 0;
      font-weight: 500;
      transition: opacity .15s;
    }
    button#send-btn:hover { opacity: .85; }
    button#send-btn:disabled { opacity: .4; cursor: default; }

    /* ── Log panel ── */
    .log-panel {
      display: flex;
      flex-direction: column;
      background: var(--bg2);
      overflow: hidden;
    }

    .log-header {
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: .06em;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .log-clear {
      cursor: pointer; color: var(--text-dim); font-size: 10px;
      padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border);
      background: none; color: var(--text-dim);
    }
    .log-clear:hover { background: var(--bg3); color: var(--text); }

    .log-entries {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 11px;
    }
    .log-entries::-webkit-scrollbar { width: 3px; }
    .log-entries::-webkit-scrollbar-thumb { background: var(--border); }

    .log-entry {
      padding: 4px 14px;
      border-left: 2px solid transparent;
      transition: background .1s;
    }
    .log-entry:hover { background: rgba(255,255,255,.03); }

    .log-entry.debug { color: var(--text-dim); border-left-color: #444; }
    .log-entry.info  { color: var(--text);     border-left-color: var(--blue); }
    .log-entry.warn  { color: var(--yellow);   border-left-color: var(--yellow); }
    .log-entry.error { color: var(--red);      border-left-color: var(--red); }

    .log-header-row {
      display: flex;
      gap: 6px;
      align-items: baseline;
    }
    .log-level {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      min-width: 32px; opacity: .8; flex-shrink: 0;
    }
    .log-ts    { color: var(--text-dim); font-size: 10px; flex-shrink: 0; }
    .log-module { color: var(--purple); min-width: 44px; flex-shrink: 0; }
    .log-event  { color: inherit; opacity: .9; }
    .log-data  {
      color: var(--text-dim); font-size: 10px;
      white-space: pre-wrap; word-break: break-all;
      margin-top: 2px; padding-left: 38px;
      line-height: 1.4;
    }

    /* ── Welcome message ── */
    .welcome {
      text-align: center;
      padding: 40px 24px;
      color: var(--text-dim);
    }
    .welcome h2 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
    .welcome p  { font-size: 13px; line-height: 1.7; }

    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; }
      .log-panel { display: none; }
      .chat-panel { border-right: none; }
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- Header -->
  <header>
    <span class="logo">⬛ openKuroneko</span>
    <span class="agent-id" id="agent-id">connecting…</span>
    <span class="dot" id="status-dot"></span>
    <span class="status-text" id="status-text">Connecting</span>
  </header>

  <!-- Chat panel -->
  <div class="chat-panel">
    <div class="messages" id="messages">
      <div class="welcome">
        <h2>Chat Agent</h2>
        <p>Agent 正在启动，请稍候…<br/>连接成功后即可开始对话。</p>
      </div>
    </div>

    <div class="input-area">
      <textarea
        id="input"
        rows="1"
        placeholder="发送消息… (Enter 发送，Shift+Enter 换行)"
        disabled
      ></textarea>
      <button id="send-btn" disabled>发送</button>
    </div>
  </div>

  <!-- Log panel -->
  <div class="log-panel">
    <div class="log-header">
      <span>Agent Logs</span>
      <button class="log-clear" id="clear-logs">清空</button>
    </div>
    <div class="log-entries" id="log-entries"></div>
  </div>

</div>

<script>
  // ── Marked config ──────────────────────────────────────────────────────────
  marked.setOptions({ breaks: true, gfm: true });

  // ── DOM refs ───────────────────────────────────────────────────────────────
  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('input');
  const sendBtn     = document.getElementById('send-btn');
  const statusDot   = document.getElementById('status-dot');
  const statusText  = document.getElementById('status-text');
  const agentIdEl   = document.getElementById('agent-id');
  const logEntriesEl = document.getElementById('log-entries');

  // ── State ──────────────────────────────────────────────────────────────────
  let connected = false;
  let thinking  = false;
  let thinkingEl = null;

  // ── SSE connection ─────────────────────────────────────────────────────────
  function connect() {
    const es = new EventSource('/events');

    es.onmessage = e => {
      const { type, data } = JSON.parse(e.data);
      if (type === 'connected') {
        setConnected(true);
        agentIdEl.textContent = `agentId: ${data.agentId}`;
        removeWelcome();
      } else if (type === 'user') {
        // We already showed user message optimistically; skip if duplicate
      } else if (type === 'agent') {
        removeThinking();
        appendMessage('agent', data);
      } else if (type === 'log') {
        appendLog(data);
      }
    };

    es.onerror = () => {
      setConnected(false);
      setTimeout(connect, 3000);
    };
  }

  function setConnected(val) {
    connected = val;
    statusDot.classList.toggle('connected', val);
    statusText.textContent = val ? 'Connected' : 'Reconnecting…';
    inputEl.disabled = !val;
    sendBtn.disabled = !val;
    if (val) inputEl.focus();
  }

  // ── Chat messages ──────────────────────────────────────────────────────────
  function removeWelcome() {
    const w = messagesEl.querySelector('.welcome');
    if (w) w.remove();
  }

  function now() {
    return new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  }

  function appendMessage(role, text) {
    const isUser = role === 'user';
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = isUser ? '👤' : '🤖';

    const right = document.createElement('div');
    right.style.display = 'flex';
    right.style.flexDirection = 'column';
    right.style.gap = '2px';
    if (isUser) right.style.alignItems = 'flex-end';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (isUser) {
      bubble.textContent = text;
    } else {
      bubble.innerHTML = marked.parse(text);
    }

    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = now();

    right.appendChild(bubble);
    right.appendChild(meta);
    wrap.appendChild(avatar);
    wrap.appendChild(right);

    messagesEl.appendChild(wrap);
    scrollToBottom();
    return wrap;
  }

  function showThinking() {
    if (thinking) return;
    thinking = true;
    const wrap = document.createElement('div');
    wrap.className = 'msg agent';
    wrap.id = '__thinking';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="thinking"><span></span><span></span><span></span></div>';

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
    thinkingEl = wrap;
  }

  function removeThinking() {
    thinking = false;
    const el = document.getElementById('__thinking');
    if (el) el.remove();
    thinkingEl = null;
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── Send ───────────────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || !connected) return;

    inputEl.value = '';
    autoResize();
    appendMessage('user', text);
    showThinking();

    try {
      await fetch('/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });
    } catch (e) {
      removeThinking();
      appendMessage('agent', `⚠️ 发送失败：${e.message}`);
    }
  }

  // ── Input auto-resize & keyboard ──────────────────────────────────────────
  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  }

  inputEl.addEventListener('input', autoResize);
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  sendBtn.addEventListener('click', sendMessage);

  // ── Logs ───────────────────────────────────────────────────────────────────
  const LOG_COLORS = { debug: 'debug', info: 'info', warn: 'warn', error: 'error' };
  let logCount = 0;
  const MAX_LOG_ENTRIES = 500;

  function appendLog(entry) {
    const level  = entry.level ?? 'info';
    const module = entry.module ?? '';
    const event  = entry.event ?? '';
    const ts     = entry.ts ? new Date(entry.ts).toLocaleTimeString('zh-CN', { hour12: false }) : '';
    const data   = entry.data ? JSON.stringify(entry.data, null, 2) : '';

    const div = document.createElement('div');
    div.className = `log-entry ${LOG_COLORS[level] ?? 'info'}`;
    div.innerHTML =
      `<div class="log-header-row">` +
        `<span class="log-level">${level}</span>` +
        `<span class="log-ts">${ts}</span>` +
        `<span class="log-module">${module}</span>` +
        `<span class="log-event">${event}</span>` +
      `</div>` +
      (data ? `<div class="log-data">${data}</div>` : '');

    logEntriesEl.appendChild(div);
    logCount++;

    // Trim old entries
    if (logCount > MAX_LOG_ENTRIES) {
      logEntriesEl.firstChild?.remove();
      logCount--;
    }

    // Auto-scroll only if already near bottom
    const { scrollTop, scrollHeight, clientHeight } = logEntriesEl;
    if (scrollHeight - scrollTop - clientHeight < 80) {
      logEntriesEl.scrollTop = logEntriesEl.scrollHeight;
    }
  }

  document.getElementById('clear-logs').addEventListener('click', () => {
    logEntriesEl.innerHTML = '';
    logCount = 0;
  });

  // ── Boot ───────────────────────────────────────────────────────────────────
  connect();
</script>
</body>
</html>
